<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Strong Downtrend Charts</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: #111827;
      --ink: #cbd5e1;
      --muted: #94a3b8;
      --grid: #243044;
      --axis: #475569;
      --selected-line: #a3e635;
      --regression: #facc15;
      --bullish: #ef4444;
      --bearish: #3b82f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(1760px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-end;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.2;
    }

    .summary {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .legend {
      display: flex;
      gap: 14px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend i {
      display: inline-block;
      width: 24px;
      height: 3px;
      border-radius: 99px;
    }

    .chart-list {
      display: grid;
      gap: 16px;
    }

    .chart-card {
      overflow: hidden;
      border: 1px solid #1f2937;
      border-radius: 6px;
      background: var(--panel);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.24);
    }

    .chart {
      display: block;
      width: 100%;
      aspect-ratio: 1600 / 900;
      max-height: 900px;
      background: var(--bg);
    }

    .chart-bg {
      fill: var(--bg);
    }

    .plot-bg {
      fill: #0f172a;
    }

    .grid-line {
      stroke: var(--grid);
      stroke-width: 1;
      shape-rendering: crispEdges;
    }

    .axis-line {
      stroke: var(--axis);
      stroke-width: 1.5;
      shape-rendering: crispEdges;
    }

    .axis-label {
      fill: var(--muted);
      font-size: 20px;
      dominant-baseline: middle;
    }

    .price-label {
      text-anchor: start;
    }

    .date-label {
      text-anchor: middle;
    }

    .selected-price-line {
      fill: none;
      stroke: var(--selected-line);
      stroke-width: 2.5;
      stroke-dasharray: 9 9;
      stroke-linejoin: round;
      stroke-linecap: round;
      opacity: 0.9;
    }

    .candle-wick {
      stroke-width: 2.2;
      stroke-linecap: round;
    }

    .candle-wick.bullish {
      stroke: var(--bullish);
    }

    .candle-wick.bearish {
      stroke: var(--bearish);
    }

    .candle-body {
      stroke-width: 1;
      rx: 1;
      shape-rendering: crispEdges;
    }

    .candle-body.bullish {
      fill: var(--bullish);
      stroke: var(--bullish);
    }

    .candle-body.bearish {
      fill: var(--bearish);
      stroke: var(--bearish);
    }

    .candle-hover-area {
      cursor: crosshair;
      pointer-events: all;
    }

    .regression-line {
      stroke: var(--regression);
      stroke-width: 3.2;
      stroke-linecap: round;
      opacity: 0.95;
    }

    .angle-guide line {
      stroke: var(--regression);
      stroke-width: 2;
      stroke-linecap: round;
      opacity: 0.8;
    }

    .angle-guide text {
      fill: var(--muted);
      font-size: 18px;
    }

    .chart-title text {
      fill: var(--ink);
      font-size: 20px;
      font-weight: 700;
    }

    .chart-title text:not(:first-child) {
      fill: var(--muted);
      font-size: 18px;
      font-weight: 600;
    }

    .last-price-line {
      stroke: var(--bullish);
      stroke-width: 1.5;
      stroke-dasharray: 5 6;
      opacity: 0.8;
    }

    .last-price-box {
      fill: var(--bullish);
      stroke: var(--bullish);
    }

    .last-price-text {
      fill: #ffffff;
      font-size: 18px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    #chart-tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid #475569;
      color: #e5e7eb;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.55;
      z-index: 9999;
      display: none;
      white-space: nowrap;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
    }

    #chart-tooltip .tooltip-date {
      color: #ffffff;
      font-weight: 700;
      margin-bottom: 4px;
    }

    #chart-tooltip .tooltip-row {
      display: flex;
      justify-content: space-between;
      gap: 18px;
    }

    #chart-tooltip .change-up {
      color: var(--bullish);
      font-weight: 700;
    }

    #chart-tooltip .change-down {
      color: var(--bearish);
      font-weight: 700;
    }

    #chart-tooltip .change-flat {
      color: #94a3b8;
      font-weight: 700;
    }

    @media (max-width: 820px) {
      main {
        width: min(100vw - 20px, 1760px);
        padding-top: 16px;
      }

      .page-header,
      .chart-card {
        display: block;
      }

      .legend {
        margin-top: 12px;
        flex-wrap: wrap;
      }

    }
  </style>
</head>

    (() => {
      const tooltip = document.getElementById("chart-tooltip");
      const formatPrice = (value) => {
        const number = Number(value);
        return Number.isFinite(number) ? Math.round(number).toLocaleString("ko-KR") : "-";
      };
      const formatChangeRate = (value) => {
        const number = Number(value);

        if (!Number.isFinite(number)) {
          return { text: "N/A", className: "change-flat" };
        }

        if (number > 0) {
          return { text: "+" + number.toFixed(2) + "%", className: "change-up" };
        }

        if (number < 0) {
          return { text: number.toFixed(2) + "%", className: "change-down" };
        }

        return { text: "0.00%", className: "change-flat" };
      };
      const showTooltip = (event) => {
        const target = event.currentTarget;
        const changeRate = formatChangeRate(target.dataset.changeRate);

        tooltip.innerHTML = [
          '<div class="tooltip-date">' + target.dataset.date + '</div>',
          '<div class="tooltip-row"><span>시가</span><strong>' + formatPrice(target.dataset.open) + '</strong></div>',
          '<div class="tooltip-row"><span>고가</span><strong>' + formatPrice(target.dataset.high) + '</strong></div>',
          '<div class="tooltip-row"><span>저가</span><strong>' + formatPrice(target.dataset.low) + '</strong></div>',
          '<div class="tooltip-row"><span>종가</span><strong>' + formatPrice(target.dataset.close) + '</strong></div>',
          '<div class="tooltip-row"><span>전일 종가 대비</span><strong class="' + changeRate.className + '">' + changeRate.text + '</strong></div>',
        ].join("");
        tooltip.style.left = event.clientX + 12 + "px";
        tooltip.style.top = event.clientY + 12 + "px";
        tooltip.style.display = "block";
      };
      const hideTooltip = () => {
        tooltip.style.display = "none";
      };

      document.querySelectorAll(".candle-hover-area").forEach((element) => {
        element.addEventListener("mousemove", showTooltip);
        element.addEventListener("mouseleave", hideTooltip);
      });
    })();
  </script>
</body>
</html>
