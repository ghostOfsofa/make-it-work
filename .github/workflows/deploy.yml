name: Deploy Charts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Static HTML
        run: |
          mkdir -p pages
          if [ -f index.html ] && [ -f chart.html ] && [ -d assets ]; then
            cp index.html pages/index.html
            cp chart.html pages/chart.html
            cp -R assets pages/assets
          elif [ -f dist/index.html ] && [ -f dist/chart.html ] && [ -d dist/assets ]; then
            cp dist/index.html pages/index.html
            cp dist/chart.html pages/chart.html
            cp -R dist/assets pages/assets
          else
            echo "index.html/chart.html/assets not found. Generate and commit static files first." >&2
            exit 1
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
